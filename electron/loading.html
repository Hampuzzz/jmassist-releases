<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>JM Assist</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a0a;color:#e5e5e5;
display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:24px}
.logo{font-size:48px;font-weight:700;background:linear-gradient(135deg,#f97316,#fb923c);
-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:16px;color:#737373}
.spin{width:40px;height:40px;border:3px solid #262626;border-top-color:#f97316;
border-radius:50%;animation:s .8s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.st{font-size:14px;color:#525252;margin-top:8px}
</style></head><body>
<div class="logo">JM Assist</div>
<div class="sub">Verkstads-ERP v1.5</div>
<div class="spin"></div>
<div class="st" id="status">Startar server...</div>
</body></html>
