appId: se.jmassist.erp
productName: JM Assist
copyright: Copyright (c) 2026 JM Assist

directories:
  output: dist-electron
  buildResources: electron/resources

forceCodeSigning: false
asar: true

# Only include Electron main/preload files + electron-updater, NOT other node_modules
files:
  - "electron/**/*"
  - "!node_modules/**/*"
  - "node_modules/electron-updater/**/*"
  - "node_modules/builder-util-runtime/**/*"
  - "node_modules/fs-extra/**/*"
  - "node_modules/graceful-fs/**/*"
  - "node_modules/jsonfile/**/*"
  - "node_modules/universalify/**/*"
  - "node_modules/js-yaml/**/*"
  - "node_modules/argparse/**/*"
  - "node_modules/lazy-val/**/*"
  - "node_modules/lodash.escaperegexp/**/*"
  - "node_modules/lodash.isequal/**/*"
  - "node_modules/semver/**/*"
  - "node_modules/tiny-typed-emitter/**/*"
  - "node_modules/debug/**/*"
  - "node_modules/ms/**/*"
  - "node_modules/sax/**/*"
  - "!src/**/*"
  - "!supabase/**/*"
  - "!.next/**/*"
  - "!dist-electron/**/*"
  - "!scripts/**/*"
  - "!public/**/*"

# The actual app goes into extraResources (standalone Next.js build)
# IMPORTANT: static & public MUST go inside .next/standalone/ where server.js runs
extraResources:
  - from: ".next/standalone"
    to: "app/.next/standalone"
    filter:
      - "**/*"
  - from: ".next/static"
    to: "app/.next/standalone/.next/static"
    filter:
      - "**/*"
  - from: "public"
    to: "app/.next/standalone/public"
    filter:
      - "**/*"
  - from: "scripts/vehicle-lookup-service.mjs"
    to: "app/scripts/vehicle-lookup-service.mjs"
  - from: ".env.local"
    to: "app/.env.local"

publish:
  provider: github
  owner: Hampuzzz
  repo: jmassist-releases

afterPack: electron/afterPack.js

win:
  icon: electron/resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: JM Assist
